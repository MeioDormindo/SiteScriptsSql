<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Script Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config={theme:{extend:{colors:{base:'#080c0a',surface:'#0f1613',raised:'#182220',edge:'#1e3028',mint:{DEFAULT:'#10b981',light:'#34d399',dark:'#059669',dim:'#064e3b'},pale:'#e2ebe5',smoke:'#5e756a'},fontFamily:{mono:['"JetBrains Mono"','monospace'],sans:['"Outfit"','sans-serif']}}}}
    </script>
    <style>
        *{box-sizing:border-box}body{overflow:hidden}
        ::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#1e3028;border-radius:3px}::-webkit-scrollbar-thumb:hover{background:#2a4038}
        .grid-bg{background-image:radial-gradient(ellipse at 15% 50%,rgba(16,185,129,.05) 0%,transparent 55%),radial-gradient(ellipse at 85% 15%,rgba(16,185,129,.03) 0%,transparent 45%),linear-gradient(rgba(16,185,129,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(16,185,129,.025) 1px,transparent 1px);background-size:100% 100%,100% 100%,48px 48px,48px 48px}
        @keyframes fiu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes ti{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}
        @keyframes too{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(100%)}}
        @keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
        @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}
        .anim-fiu{animation:fiu .3s ease-out both}.anim-ti{animation:ti .3s ease-out}.anim-too{animation:too .3s ease-in forwards}
        .si{transition:background .12s,border-color .12s}.si:hover{background:#182220}.si.act{background:#182220;border-left-color:#10b981!important}
        .ln{line-height:1.65;font-size:13px}.et{line-height:1.65;font-size:13px;tab-size:4}
        .fc{transition:all .12s}.fc.on{background:#064e3b;color:#34d399;border-color:#10b981}
        .b-SELECT{background:#1e3a5f;color:#60a5fa}.b-INSERT{background:#064e3b;color:#34d399}.b-UPDATE{background:#451a03;color:#fbbf24}
        .b-DELETE{background:#450a0a;color:#f87171}.b-CREATE{background:#083344;color:#22d3ee}.b-ALTER{background:#431407;color:#fb923c}
        .b-DROP{background:#450a0a;color:#dc2626}.b-GRANT{background:#2e1065;color:#a78bfa}.b-EXEC{background:#134e4a;color:#2dd4bf}
        .b-BLOCK{background:#1a1a2e;color:#818cf8}.b-SET{background:#1c1917;color:#a8a29e}.b-USE{background:#1c1917;color:#a8a29e}
        .b-OTHER{background:#1f2937;color:#9ca3af}
        textarea{resize:none}.fr:focus-visible{outline:2px solid #10b981;outline-offset:-2px}
        .sd{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
        .sd-ok{background:#10b981;box-shadow:0 0 6px #10b98166}.sd-w{background:#fbbf24;box-shadow:0 0 6px #fbbf2466}
        .sd-e{background:#f87171;box-shadow:0 0 6px #f8717166}.sd-o{background:#4b5563}
        .sb{background:linear-gradient(90deg,#064e3b,#0f1613 40%,#0f1613 60%,#064e3b)}
        .err-shake{animation:shake .4s ease-in-out}
        .file-chip{background:#0f1613;border:1px solid #1e3028;border-radius:6px;padding:4px 8px;font-size:10px;color:#5e756a;display:flex;align-items:center;gap:6px;cursor:pointer;transition:all .15s;max-width:100%;overflow:hidden}
        .file-chip:hover{border-color:#10b981;color:#34d399}
        .file-chip .fn{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
        @media(max-width:767px){main.ms aside{display:none}main:not(.ms) .es{display:none}aside{width:100%!important;border-right:none!important}}
        @media(min-width:768px){.mb{display:none!important}}
        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
    </style>
</head>
<body class="bg-base text-pale font-sans h-screen flex flex-col grid-bg">

<div id="T" class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>
<div id="SB" class="hidden sb border-b border-mint/20 px-4 py-2.5 flex items-center gap-3 z-10 shrink-0">
    <i class="fa-solid fa-arrows-rotate text-mint text-sm" style="animation:pulse 2s infinite"></i>
    <span id="SBm" class="text-sm text-mint-light flex-1"></span>
    <button onclick="q('#SB').classList.add('hidden')" class="text-smoke hover:text-pale text-xs"><i class="fa-solid fa-xmark"></i></button>
</div>
<div id="CM" class="hidden fixed inset-0 z-30 flex items-center justify-center bg-black/60 backdrop-blur-sm">
    <div class="bg-surface border border-edge rounded-xl p-6 max-w-sm w-full mx-4 anim-fiu shadow-2xl">
        <h3 id="CMt" class="text-lg font-bold mb-2"></h3>
        <p id="CMm" class="text-smoke text-sm mb-6 leading-relaxed"></p>
        <div class="flex gap-3 justify-end">
            <button onclick="hCM()" class="px-4 py-2 rounded-lg text-sm font-medium text-smoke hover:text-pale border border-edge hover:border-smoke transition-colors fr">Cancelar</button>
            <button id="CMy" class="px-4 py-2 rounded-lg text-sm font-medium bg-red-600 hover:bg-red-500 text-white transition-colors fr">Confirmar</button>
        </div>
    </div>
</div>
<div id="SM" class="hidden fixed inset-0 z-30 flex items-center justify-center bg-black/60 backdrop-blur-sm">
    <div class="bg-surface border border-edge rounded-xl p-6 max-w-lg w-full mx-4 anim-fiu shadow-2xl max-h-[90vh] overflow-y-auto">
        <div class="flex items-center justify-between mb-5">
            <h3 class="text-lg font-bold">Configurar Sincronizacao</h3>
            <button onclick="q('#SM').classList.add('hidden')" class="w-8 h-8 rounded-lg hover:bg-raised text-smoke hover:text-pale flex items-center justify-center transition-colors"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="space-y-4">
            <div><label class="block text-xs font-semibold text-smoke mb-1.5">URL do Banco Remoto</label>
            <input type="url" id="SU" placeholder="https://exemplo.com/scripts-backup.json" class="w-full h-10 px-3 bg-base border border-edge rounded-lg text-sm text-pale placeholder-smoke/30 focus:border-mint focus:outline-none font-mono text-xs fr">
            <p class="text-[10px] text-smoke/50 mt-1.5 leading-relaxed">URL de um arquivo JSON exportado por outra instancia. Hospede em GitHub Pages, Netlify, S3, etc.</p></div>
            <label class="flex items-start gap-3 cursor-pointer p-3 rounded-lg bg-raised/50 border border-edge/50 hover:border-edge transition-colors">
                <input type="checkbox" id="SA" class="accent-emerald-500 w-4 h-4 mt-0.5 shrink-0">
                <div><span class="text-sm font-medium text-pale">Sincronizar automaticamente ao abrir</span><p class="text-[11px] text-smoke/60 mt-0.5">Busca alteracoes no servidor e combina com o banco local</p></div>
            </label>
            <div id="SL" class="hidden p-3 rounded-lg bg-base border border-edge/50">
                <p class="text-[10px] text-smoke/50 uppercase tracking-widest font-semibold mb-1">Ultima Sincronizacao</p>
                <p id="SLt" class="text-xs text-pale leading-relaxed"></p>
            </div>
            <div class="flex gap-2 pt-2">
                <button onclick="testSync()" id="STb" class="h-9 px-4 rounded-lg text-xs font-semibold border border-edge hover:border-smoke text-smoke hover:text-pale transition-colors flex items-center gap-2 fr"><i class="fa-solid fa-plug text-[10px]"></i> Testar</button>
                <div class="flex-1"></div>
                <button onclick="q('#SM').classList.add('hidden')" class="h-9 px-4 rounded-lg text-xs font-medium border border-edge hover:border-smoke text-smoke hover:text-pale transition-colors fr">Cancelar</button>
                <button onclick="saveCfg()" class="h-9 px-5 rounded-lg text-xs font-semibold bg-mint hover:bg-mint-light text-base transition-colors fr">Salvar</button>
            </div>
        </div>
    </div>
</div>
<input type="file" id="IF" class="hidden" accept=".json">

<header class="h-14 border-b border-edge flex items-center px-4 gap-3 shrink-0 bg-surface/80 backdrop-blur-md z-10">
    <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 rounded-lg bg-mint/10 flex items-center justify-center"><i class="fa-solid fa-database text-mint text-sm"></i></div>
        <h1 class="text-base font-extrabold tracking-tight hidden sm:block">SQL Script Manager</h1>
        <h1 class="text-base font-extrabold tracking-tight sm:hidden">SQL Manager</h1>
    </div>
    <div id="StB" class="hidden md:flex items-center gap-2 ml-2"></div>
    <div class="flex-1"></div>
    <div id="SSw" class="hidden md:flex items-center gap-1.5 mr-1 cursor-pointer" onclick="openCfg()" title="Configurar sincronizacao">
        <span id="SD" class="sd sd-o"></span><span id="SLbl" class="text-[10px] text-smoke/60">Offline</span>
    </div>
    <div class="flex items-center gap-1.5">
        <button onclick="addNew()" class="h-8 px-3 rounded-lg text-xs font-semibold bg-mint hover:bg-mint-light text-base transition-colors flex items-center gap-1.5 fr" title="Ctrl+N"><i class="fa-solid fa-plus text-[10px]"></i><span class="hidden sm:inline">Novo</span></button>
        <button onclick="quickSave()" id="SvAllB" class="h-8 px-3 rounded-lg text-xs font-medium border border-edge hover:border-mint text-smoke hover:text-mint transition-colors flex items-center gap-1.5 fr" title="Salvar no arquivo (Ctrl+Shift+S)"><i class="fa-solid fa-floppy-disk text-[10px]"></i><span class="hidden lg:inline" id="SvAllL">Salvar em...</span></button>
        <button onclick="saveAsNew()" class="h-8 px-2.5 rounded-lg text-xs text-smoke hover:text-pale hover:bg-raised transition-colors fr" title="Salvar como novo arquivo"><i class="fa-solid fa-file-circle-plus text-[10px]"></i></button>
        <button onclick="q('#IF').click()" class="h-8 px-3 rounded-lg text-xs font-medium border border-edge hover:border-smoke text-smoke hover:text-pale transition-colors flex items-center gap-1.5 fr" title="Importar backup"><i class="fa-solid fa-upload text-[10px]"></i><span class="hidden lg:inline">Importar</span></button>
        <button onclick="doSync()" id="SyB" class="h-8 px-3 rounded-lg text-xs font-medium border border-edge hover:border-mint text-smoke hover:text-mint transition-colors flex items-center gap-1.5 fr" title="Sincronizar agora"><i class="fa-solid fa-arrows-rotate text-[10px]"></i><span class="hidden lg:inline">Sync</span></button>
        <button onclick="openCfg()" class="h-8 w-8 rounded-lg border border-edge hover:border-smoke text-smoke hover:text-pale transition-colors flex items-center justify-center fr" title="Config"><i class="fa-solid fa-gear text-xs"></i></button>
        <button onclick="askClr()" class="h-8 w-8 rounded-lg border border-edge hover:border-red-500/50 text-smoke hover:text-red-400 transition-colors flex items-center justify-center fr" title="Limpar banco"><i class="fa-solid fa-trash text-xs"></i></button>
    </div>
</header>

<main id="M" class="flex-1 flex overflow-hidden">
    <aside class="w-72 md:w-80 border-r border-edge flex flex-col shrink-0 bg-surface/40">
        <div class="px-3 pt-3 pb-1.5">
            <div class="relative"><i class="fa-solid fa-magnifying-glass absolute left-2.5 top-1/2 -translate-y-1/2 text-smoke/50 text-[11px]"></i>
            <input type="search" id="SeI" placeholder="Buscar scripts..." class="w-full h-8 pl-8 pr-3 bg-base border border-edge rounded-lg text-xs text-pale placeholder-smoke/40 focus:border-mint focus:outline-none fr"></div>
        </div>
        <div class="px-3 pb-2 flex flex-wrap gap-1" id="Ch"></div>
        <div class="flex-1 overflow-y-auto" id="SLi"></div>
        <div id="FC" class="hidden px-3 py-2 border-t border-edge">
            <div class="file-chip" onclick="saveAsNew()" title="Clique para trocar arquivo">
                <i class="fa-solid fa-file-arrow-down text-[9px] shrink-0"></i>
                <span class="fn" id="FN"></span>
                <i class="fa-solid fa-pen text-[8px] shrink-0 opacity-40 hover:opacity-100"></i>
            </div>
        </div>
        <div id="LF" class="p-2 border-t border-edge text-center">
            <button onclick="loadEx()" class="text-[11px] text-smoke/60 hover:text-mint transition-colors"><i class="fa-solid fa-flask text-[9px] mr-1"></i> Carregar exemplos</button>
        </div>
    </aside>
    <section class="es flex-1 flex flex-col overflow-hidden">
        <div id="EE" class="flex-1 flex items-center justify-center">
            <div class="text-center px-6">
                <div class="w-20 h-20 rounded-2xl bg-surface border border-edge flex items-center justify-center mx-auto mb-6"><i class="fa-solid fa-database text-3xl text-edge"></i></div>
                <h2 class="text-xl font-bold mb-2 text-pale/70">Banco Local Vazio</h2>
                <p class="text-smoke text-sm max-w-sm mx-auto mb-6 leading-relaxed">Crie scripts, importe um backup ou configure a sincronizacao remota</p>
                <div class="flex gap-3 justify-center flex-wrap">
                    <button onclick="addNew()" class="h-9 px-5 rounded-lg bg-mint hover:bg-mint-light text-base text-sm font-semibold transition-colors fr"><i class="fa-solid fa-plus mr-1.5 text-xs"></i> Novo Script</button>
                    <button onclick="q('#IF').click()" class="h-9 px-5 rounded-lg border border-edge hover:border-smoke text-smoke hover:text-pale text-sm font-medium transition-colors fr"><i class="fa-solid fa-upload mr-1.5 text-xs"></i> Importar</button>
                    <button onclick="loadEx()" class="h-9 px-5 rounded-lg border border-edge hover:border-smoke text-smoke hover:text-pale text-sm font-medium transition-colors fr"><i class="fa-solid fa-flask mr-1.5 text-xs"></i> Exemplo</button>
                </div>
            </div>
        </div>
        <div id="ED" class="hidden flex-1 flex flex-col overflow-hidden">
            <div class="px-4 py-2.5 border-b border-edge flex items-center gap-3 shrink-0 bg-surface/30">
                <button onclick="desel()" class="mb w-8 h-8 rounded-lg border border-edge hover:border-smoke text-smoke hover:text-pale flex items-center justify-center transition-colors fr"><i class="fa-solid fa-arrow-left text-xs"></i></button>
                <input type="text" id="EN" class="flex-1 bg-transparent text-lg font-bold text-pale focus:outline-none placeholder-smoke/30 min-w-0" placeholder="Nome do script...">
                <span id="EB" class="b-OTHER text-[9px] font-bold px-2 py-0.5 rounded-md uppercase tracking-widest shrink-0"></span>
                <span id="EM" class="text-[11px] text-smoke hidden lg:inline shrink-0"></span>
            </div>
            <div class="flex-1 flex overflow-hidden">
                <div class="ln w-10 bg-surface/60 text-smoke/40 text-right pr-2 pt-3 pl-2 overflow-hidden shrink-0 select-none font-mono border-r border-edge/60" id="LN"></div>
                <textarea id="ET" class="et flex-1 bg-transparent text-pale/90 p-3 focus:outline-none font-mono overflow-auto" spellcheck="false" placeholder="-- Escreva seu script SQL aqui..."></textarea>
            </div>
            <div class="px-4 py-2 border-t border-edge flex items-center justify-between shrink-0 bg-surface/30">
                <span id="CI" class="text-[11px] text-smoke/50 font-mono">Ln 1, Col 1</span>
                <div class="flex items-center gap-1">
                    <button id="SvB" onclick="saveCur()" class="h-7 px-3 rounded-md text-xs font-semibold bg-mint/10 text-mint hover:bg-mint/20 transition-colors flex items-center gap-1.5 fr" title="Ctrl+S"><i class="fa-solid fa-check text-[10px]"></i> Salvar</button>
                    <button onclick="dupCur()" class="h-7 px-2.5 rounded-md text-xs text-smoke hover:text-pale hover:bg-raised transition-colors fr" title="Duplicar"><i class="fa-regular fa-copy"></i></button>
                    <button onclick="cpCur()" class="h-7 px-2.5 rounded-md text-xs text-smoke hover:text-pale hover:bg-raised transition-colors fr" title="Copiar"><i class="fa-regular fa-clipboard"></i></button>
                    <button onclick="dlCur()" class="h-7 px-2.5 rounded-md text-xs text-smoke hover:text-pale hover:bg-raised transition-colors fr" title="Download .sql"><i class="fa-solid fa-arrow-down text-[10px]"></i></button>
                    <div class="w-px h-4 bg-edge mx-0.5"></div>
                    <button onclick="askDel()" class="h-7 px-2.5 rounded-md text-xs text-smoke hover:text-red-400 hover:bg-red-500/10 transition-colors fr" title="Excluir"><i class="fa-regular fa-trash-can"></i></button>
                </div>
            </div>
        </div>
    </section>
</main>

<script>
const q=s=>document.querySelector(s);
const D={T:q('#T'),SB:q('#SB'),SBm:q('#SBm'),CM:q('#CM'),CMt:q('#CMt'),CMm:q('#CMm'),CMy:q('#CMy'),
SM:q('#SM'),SU:q('#SU'),SA:q('#SA'),SL:q('#SL'),SLt:q('#SLt'),STb:q('#STb'),
StB:q('#StB'),SeI:q('#SeI'),Ch:q('#Ch'),SLi:q('#SLi'),LF:q('#LF'),FC:q('#FC'),FN:q('#FN'),
EE:q('#EE'),ED:q('#ED'),EN:q('#EN'),EB:q('#EB'),EM:q('#EM'),
LN:q('#LN'),ET:q('#ET'),CI:q('#CI'),SvB:q('#SvB'),M:q('#M'),
SD:q('#SD'),SLbl:q('#SLbl'),SSw:q('#SSw'),SyB:q('#SyB'),IF:q('#IF'),
SvAllB:q('#SvAllB'),SvAllL:q('#SvAllL')};

const S={scripts:[],ctr:0,selId:null,filter:'ALL',search:'',dirty:false};
let _u=0;const gid=()=>'s_'+Date.now()+'_'+(++_u);

/* ========== Utilitarios ========== */
function dT(sql){const t=sql.trim().toUpperCase();const m=[[/^SELECT\b/i,'SELECT'],[/^INSERT\b/i,'INSERT'],[/^UPDATE\b/i,'UPDATE'],[/^DELETE\b/i,'DELETE'],[/^CREATE\b/i,'CREATE'],[/^ALTER\b/i,'ALTER'],[/^DROP\b/i,'DROP'],[/^(GRANT|REVOKE)\b/i,'GRANT'],[/^(EXEC|EXECUTE)\b/i,'EXEC'],[/^(DECLARE|BEGIN|IF\b|WHILE|FOR\b|CASE)\b/i,'BLOCK'],[/^SET\b/i,'SET'],[/^USE\b/i,'USE']];for(const[r,n]of m)if(r.test(t))return n;return'OTHER'}
function nL(s){return s?s.split('\n').length:0}
function tr(s,n){return(!s||s.length<=n)?s:s.substring(0,n)+'…'}
function eH(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fL(s,n){return s?s.split('\n').slice(0,n).join('\n'):''}
function fD(ts){return new Date(ts).toLocaleDateString('pt-BR')+' '+new Date(ts).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}
const hasFS='showSaveFilePicker' in window;

/* ========== IndexedDB ========== */
const DBN='SQLScriptMgr',DBV=3,TS='scripts',TC='config';
function oDB(){return new Promise((r,j)=>{const req=indexedDB.open(DBN,DBV);req.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains(TS)){const st=db.createObjectStore(TS,{keyPath:'id'});st.createIndex('name','name',{unique:false});st.createIndex('ts','ts',{unique:false})}if(!db.objectStoreNames.contains(TC))db.createObjectStore(TC,{keyPath:'key'})};req.onsuccess=()=>r(req.result);req.onerror=()=>j(req.error)})}
function dbA(){return new Promise(async(r,j)=>{const db=await oDB();const req=db.transaction(TS,'readonly').objectStore(TS).getAll();req.onsuccess=()=>r(req.result);req.onerror=()=>j(req.error)})}
function dbP(sc){return new Promise(async(r,j)=>{const db=await oDB();const req=db.transaction(TS,'readwrite').objectStore(TS).put(sc);req.onsuccess=()=>r(req.result);req.onerror=()=>j(req.error)})}
function dbD(id){return new Promise(async(r,j)=>{const db=await oDB();const req=db.transaction(TS,'readwrite').objectStore(TS).delete(id);req.onsuccess=()=>r();req.onerror=()=>j(req.error)})}
function dbC(){return new Promise(async(r,j)=>{const db=await oDB();const req=db.transaction(TS,'readwrite').objectStore(TS).clear();req.onsuccess=()=>r();req.onerror=()=>j(req.error)})}
async function cG(k,d){try{const db=await oDB();return new Promise((r,j)=>{const req=db.transaction(TC,'readonly').objectStore(TC).get(k);req.onsuccess=()=>r(req.result?req.result.value:d);req.onerror=()=>j(req.error)})}catch(e){return d}}
async function cS(k,v){const db=await oDB();return new Promise((r,j)=>{const req=db.transaction(TC,'readwrite').objectStore(TC).put({key:k,value:v});req.onsuccess=()=>r();req.onerror=()=>j(req.error)})}
async function reload(){S.scripts=await dbA();S.scripts.sort((a,b)=>b.ts-a.ts);S.ctr=await cG('counter',S.scripts.length)}

/* ========== Nome Unico ========== */
function fDup(n,ex){return S.scripts.find(s=>s.id!==ex&&s.name.toLowerCase()===n.toLowerCase())}
function uName(base,ex){if(!fDup(base,ex))return base;let i=2,n;do{n=base+' ('+i+')';i++}while(fDup(n,ex));return n}

/* ========== CRUD ========== */
async function addScr(c,src){S.ctr++;await cS('counter',S.ctr);let nm=uName('Script '+S.ctr,null);const sc={id:gid(),name:nm,content:c,type:dT(c),source:src||'manual',ts:Date.now()};await dbP(sc);await reload();return sc}
async function rmScr(id){await dbD(id);if(S.selId===id)S.selId=null;await reload()}
async function updScr(id,u){const sc=S.scripts.find(s=>s.id===id);if(!sc)return null;if(u.name!==undefined&&u.name!==sc.name){if(fDup(u.name,id)){toast('Ja existe um script chamado "'+u.name+'"','error');return null}}Object.assign(sc,u);if(u.content!==undefined)sc.type=dT(u.content);sc.ts=Date.now();await dbP(sc);await reload();return sc}
function filtered(){return S.scripts.filter(s=>{const mf=S.filter==='ALL'||s.type===S.filter;const ms=!S.search||s.name.toLowerCase().includes(S.search.toLowerCase())||s.content.toLowerCase().includes(S.search.toLowerCase());return mf&&ms})}
function selScr(){return S.scripts.find(s=>s.id===S.selId)||null}

/* ========== Merge ========== */
async function merge(remote){const locMap=new Map();S.scripts.forEach(s=>locMap.set(s.name.toLowerCase(),s));let added=0,updated=0,skipped=0;const batch=[];for(const rm of remote){const lc=locMap.get(rm.name.toLowerCase());if(lc){if(rm.ts>lc.ts){rm.id=lc.id;rm.source='sync';batch.push(rm);updated++}else{skipped++}}else{rm.id=gid();rm.source='sync';batch.push(rm);added++}}for(const sc of batch)await dbP(sc);await reload();return{added,updated,skipped}}

/* ========== FILE HANDLE — o coracao da persistencia de arquivo ========== */
let _fh=null; // file handle em memoria
let _fn='';  // nome do arquivo

// Tenta recuperar o handle do IndexedDB (IndexedDB nao guarda handles nativos,
// entao guardamos apenas o nome e pedimos permissao de novo ao abrir)
async function initFH(){
    _fn=await cG('fileName','');
    upFC();
}

// Gera o JSON de backup
function bkData(){
    return JSON.stringify({format:'sql-script-manager-backup',version:1,exportedAt:new Date().toISOString(),
        scripts:S.scripts.map(s=>({id:s.id,name:s.name,content:s.content,type:s.type,source:s.source,ts:s.ts}))},null,2);
}

// Pede para o usuario escolher onde salvar (primeira vez ou "salvar como")
async function pickFile(){
    if(!hasFS){fallbackDL();return null}
    try{
        const h=await window.showSaveFilePicker({
            suggestedName:_fn||'sql_scripts.json',
            types:[{description:'JSON Backup',accept:{'application/json':['.json']}}]
        });
        _fh=h;_fn=h.name;await cS('fileName',_fn);upFC();return h;
    }catch(e){if(e.name!=='AbortError')toast('Erro ao selecionar arquivo: '+e.message,'error');return null}
}

// Escreve no handle existente ou pede novo se necessario
async function writeFH(data){
    if(!hasFS){fallbackDL();return}
    try{
        // Se tem handle, tenta verificar se ainda e valido
        if(_fh){
            try{const w=await _fh.createWritable();await w.write(data);await w.close();return}catch(e){
                // Handle invalido — cai no pick
                if(e.name==='NotAllowedError'||e.name==='NotFoundError'){_fh=null}
                else throw e;
            }
        }
        // Nao tem handle — tenta pedir de novo com o nome conhecido
        if(!_fn){const h=await pickFile();if(!h)return;_fh=h}
        else{
            // Tenta com o nome salvo — o navegador pode ou nao lembrar
            try{
                const h=await window.showSaveFilePicker({
                    suggestedName:_fn,
                    types:[{description:'JSON Backup',accept:{'application/json':['.json']}}]
                });
                _fh=h;_fn=h.name;await cS('fileName',_fn);
                const w=await _fh.createWritable();await w.write(data);await w.close();
            }catch(e){
                if(e.name==='AbortError')return;
                throw e;
            }
        }
    }catch(e){toast('Erro ao salvar: '+e.message,'error')}
}

// Fallback para navegadores sem File System Access
function fallbackDL(){
    const b=new Blob([bkData()],{type:'application/json'});
    const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=_fn||'sql_scripts.json';a.click();URL.revokeObjectURL(u);
    toast('Download do backup gerado','success');
}

// Salvar rapido — mesma funcao, mesmo arquivo, sempre
async function quickSave(){
    if(S.dirty&&S.selId){const sc=selScr();if(sc){const nm=D.EN.value.trim()||sc.name;if(!fDup(nm,sc.id)){await updScr(sc.id,{name:nm,content:D.ET.value});S.dirty=false}else{D.EN.classList.add('err-shake');setTimeout(()=>D.EN.classList.remove('err-shake'),400);return}}}
    const data=bkData();
    if(!hasFS){fallbackDL();return}
    if(!_fh&&_fn){
        // Primeiro save depois de importar — pede confirmacao do caminho
        const h=await pickFile();if(!h)return;
    }
    await writeFH(data);
    toast('Salvo em '+_fn,'success');
}

// Salvar como — sempre escolhe novo caminho
async function saveAsNew(){const h=await pickFile();if(!h)return;const data=bkData();try{const w=await h.createWritable();await w.write(data);await w.close();toast('Salvo em '+h.name,'success')}catch(e){toast('Erro: '+e.message,'error')}}

// Atualiza o chip de arquivo na sidebar
function upFC(){
    if(_fn){D.FC.classList.remove('hidden');D.FN.textContent=_fn;D.FN.title=_fn;D.SvAllL.textContent='Salvar';D.SvAllB.title='Salvar em '+_fn+' (Ctrl+Shift+S)'}
    else{D.FC.classList.add('hidden');D.SvAllL.textContent='Salvar em...';D.SvAllB.title='Escolher onde salvar o backup'}
}

/* ========== Importar Backup ========== */
async function impBk(file){
    return new Promise(res=>{
        const rd=new FileReader();
        rd.onload=async e=>{
            try{
                const data=JSON.parse(e.target.result);
                if(data.format!=='sql-script-manager-backup'||!Array.isArray(data.scripts)){toast('Arquivo invalido: formato nao reconhecido','error');res(false);return}
                const r=await merge(data.scripts);
                const p=[];if(r.added)p.push(r.added+' novo(s)');if(r.updated)p.push(r.updated+' atualizado(s)');if(r.skipped)p.push(r.skipped+' mantido(s)');
                const msg='Importacao: '+(p.length?p.join(', '):'nenhuma alteracao');
                toast(msg,'success');showBanner(msg);
                // Importar define o arquivo de destino
                _fn=file.name;await cS('fileName',_fn);upFC();
                render();res(true);
            }catch(err){toast('Erro ao ler arquivo: '+err.message,'error');res(false)}
        };
        rd.onerror=()=>{toast('Erro ao ler arquivo','error');res(false)};rd.readAsText(file);
    });
}

/* ========== Sincronizacao Remota ========== */
async function doSync(){
    const url=await cG('syncUrl','');if(!url){toast('Nenhuma URL configurada','warning');openCfg();return}
    setSS('w');
    try{
        const resp=await fetch(url,{cache:'no-store'});if(!resp.ok)throw new Error('HTTP '+resp.status);
        const data=await resp.json();if(data.format!=='sql-script-manager-backup'||!data.scripts)throw new Error('Formato invalido no servidor');
        const r=await merge(data.scripts);
        const p=[];if(r.added)p.push(r.added+' novo(s)');if(r.updated)p.push(r.updated+' atualizado(s)');if(r.skipped)p.push(r.skipped+' sem mudanca');
        const msg='Sync: '+(p.length?p.join(', '):'tudo atualizado');
        await cS('lastSync',{ts:Date.now(),result:r,url});setSS('ok');toast(msg,'success');showBanner(msg);render();
    }catch(err){await cS('lastSync',{ts:Date.now(),error:err.message,url});setSS('e');toast('Falha na sync: '+err.message,'error')}
}
async function autoSync(){const u=await cG('syncUrl','');const a=await cG('syncAuto',false);if(u&&a)await doSync()}
function setSS(st){D.SSw.classList.remove('hidden');const d=D.SD,l=D.SLbl;d.className='sd';if(st==='ok'){d.classList.add('sd-ok');l.textContent='Sincronizado';l.className='text-[10px] text-mint/70'}else if(st==='e'){d.classList.add('sd-e');l.textContent='Erro';l.className='text-[10px] text-red-400/70'}else if(st==='w'){d.classList.add('sd-w');l.textContent='Sincronizando...';l.className='text-[10px] text-amber-400/70'}else{d.classList.add('sd-o');l.textContent='Offline';l.className='text-[10px] text-smoke/60'}}
function showBanner(m){D.SBm.textContent=m;D.SB.classList.remove('hidden')}

/* ========== Config Modal ========== */
async function openCfg(){
    D.SU.value=await cG('syncUrl','');D.SA.checked=await cG('syncAuto',false);
    const ls=await cG('lastSync',null);
    if(ls){D.SL.classList.remove('hidden');let t=fD(ls.ts);if(ls.error)t+='\nErro: '+ls.error;else if(ls.result)t+='\n'+ls.result.added+' novos, '+ls.result.updated+' atualizados, '+ls.result.skipped+' mantidos';D.SLt.textContent=t}else{D.SL.classList.add('hidden')}
    D.SM.classList.remove('hidden');
}
async function saveCfg(){const url=D.SU.value.trim();await cS('syncUrl',url);await cS('syncAuto',D.SA.checked);setSS(url?'ok':'o');toast('Configuracao salva','success');q('#SM').classList.add('hidden')}
async function testSync(){const url=D.SU.value.trim();if(!url){toast('Insira uma URL','warning');return}const b=D.STb;b.innerHTML='<i class="fa-solid fa-spinner spin text-[10px]"></i> Testando...';b.disabled=true;try{const r=await fetch(url,{method:'HEAD',cache:'no-store'});toast(r.ok?'Conexao OK (HTTP '+r.status+')':'HTTP '+r.status,r.ok?'success':'warning')}catch(e){toast('Falha: '+e.message,'error')}b.innerHTML='<i class="fa-solid fa-plug text-[10px]"></i> Testar';b.disabled=false}

/* ========== Render ========== */
function render(){rSt();rCh();rLi();rEd();rFt();rMb()}
function rMb(){if(S.selId)D.M.classList.add('ms');else D.M.classList.remove('ms')}
function rSt(){
    if(!S.scripts.length){D.StB.classList.add('hidden');return}D.StB.classList.remove('hidden');
    const tc={};S.scripts.forEach(s=>{tc[s.type]=(tc[s.type]||0)+1});
    let h='<span class="text-[11px] text-smoke font-medium">'+S.scripts.length+' script'+(S.scripts.length!==1?'s':'')+'</span>';
    Object.entries(tc).sort((a,b)=>b[1]-a[1]).forEach(([t,c])=>{h+='<span class="text-[10px] px-1.5 py-0.5 rounded b-'+t+' font-semibold">'+t+' '+c+'</span>'});
    D.StB.innerHTML=h;
}
function rCh(){
    const ts=new Set(S.scripts.map(s=>s.type));const ord=['SELECT','INSERT','UPDATE','DELETE','CREATE','ALTER','DROP','GRANT','EXEC','BLOCK','SET','USE','OTHER'];
    let h='<button class="fc text-[10px] px-2 py-0.5 rounded-md border border-edge font-semibold '+(S.filter==='ALL'?'on':'text-smoke hover:text-pale')+'" onclick="setF(\'ALL\')">Todos</button>';
    ord.forEach(t=>{if(!ts.has(t))return;const c=S.scripts.filter(s=>s.type===t).length;h+='<button class="fc text-[10px] px-2 py-0.5 rounded-md border border-edge font-semibold '+(S.filter===t?'on':'text-smoke hover:text-pale')+'" onclick="setF(\''+t+'\')">'+t+' <span class="opacity-50">'+c+'</span></button>'});
    D.Ch.innerHTML=h;
}
function rLi(){
    const list=filtered();
    if(!list.length&&!S.scripts.length){D.SLi.innerHTML='';return}
    if(!list.length){D.SLi.innerHTML='<div class="p-6 text-center"><p class="text-smoke/50 text-xs">Nenhum script encontrado</p></div>';return}
    let h='';
    list.forEach((sc,i)=>{
        const a=sc.id===S.selId;const pv=tr(fL(sc.content,2),70);const nl=nL(sc.content);
        h+='<div class="si px-3 py-2.5 border-l-2 '+(a?'border-l-mint act':'border-l-transparent')+' cursor-pointer anim-fiu" style="animation-delay:'+i*18+'ms" onclick="sel(\''+sc.id+'\')">'
            +'<div class="flex items-center gap-2 mb-0.5"><span class="b-'+sc.type+' text-[9px] font-bold px-1.5 py-0.5 rounded uppercase tracking-widest shrink-0">'+sc.type+'</span>'
            +'<span class="text-xs font-semibold text-pale truncate flex-1 min-w-0">'+eH(sc.name)+'</span></div>'
            +'<pre class="text-[11px] text-smoke/50 font-mono truncate leading-relaxed">'+eH(pv)+'</pre>'
            +'<div class="flex items-center gap-2 mt-1"><span class="text-[10px] text-smoke/35">'+nl+' ln</span>'
            +(sc.source==='sync'?'<span class="text-[10px] text-mint/40"><i class="fa-solid fa-cloud-arrow-down text-[8px] mr-0.5"></i>sync</span>':'')
            +'<span class="text-[10px] text-smoke/25 ml-auto">'+fD(sc.ts)+'</span></div></div>';
    });
    D.SLi.innerHTML=h;
}
function rEd(){
    const sc=selScr();
    if(!sc){D.EE.classList.remove('hidden');D.ED.classList.add('hidden');return}
    D.EE.classList.add('hidden');D.ED.classList.remove('hidden');
    if(document.activeElement!==D.EN)D.EN.value=sc.name;
    D.EB.textContent=sc.type;D.EB.className='b-'+sc.type+' text-[9px] font-bold px-2 py-0.5 rounded-md uppercase tracking-widest shrink-0';
    D.EM.textContent=nL(sc.content)+' ln · '+sc.content.length+' car. · '+fD(sc.ts);
    if(document.activeElement!==D.ET){D.ET.value=sc.content;uLN()}
    if(S.dirty){D.SvB.innerHTML='<i class="fa-solid fa-circle text-[5px] text-amber-400 mr-1"></i> Salvar';D.SvB.className='h-7 px-3 rounded-md text-xs font-semibold bg-amber-500/10 text-amber-400 hover:bg-amber-500/20 transition-colors flex items-center gap-1.5 fr'}
    else{D.SvB.innerHTML='<i class="fa-solid fa-check text-[10px]"></i> Salvar';D.SvB.className='h-7 px-3 rounded-md text-xs font-semibold bg-mint/10 text-mint hover:bg-mint/20 transition-colors flex items-center gap-1.5 fr'}
}
function rFt(){D.LF.style.display=S.scripts.length?'none':'block'}
function uLN(){const n=D.ET.value.split('\n').length;let h='';for(let i=1;i<=n;i++)h+=i+'\n';D.LN.textContent=h}
function uCI(){const v=D.ET.value,p=D.ET.selectionStart,bc=v.substring(0,p);D.CI.textContent='Ln '+bc.split('\n').length+', Col '+(p-bc.lastIndexOf('\n'))}

/* ========== Acoes ========== */
async function sel(id){if(S.dirty&&S.selId){const sc=selScr();if(sc&&(sc.name!==D.EN.value.trim()||sc.content!==D.ET.value))await saveCur(true)}S.selId=id;S.dirty=false;render();setTimeout(()=>D.ET.focus(),40)}
async function desel(){if(S.dirty&&S.selId)await saveCur(true);S.selId=null;S.dirty=false;render()}
async function saveCur(silent){
    const sc=selScr();if(!sc)return;const nm=D.EN.value.trim()||sc.name;
    if(fDup(nm,sc.id)){toast('Ja existe um script chamado "'+nm+'"','error');D.EN.classList.add('err-shake');setTimeout(()=>D.EN.classList.remove('err-shake'),400);D.EN.value=sc.name;D.EN.focus();return}
    const r=await updScr(sc.id,{name:nm,content:D.ET.value});if(r===null)return;S.dirty=false;if(!silent)toast('Salvo no banco local','success');render();
}
async function cpCur(){const sc=selScr();if(!sc)return;try{await navigator.clipboard.writeText(sc.content);toast('Copiado','success')}catch(e){const t=document.createElement('textarea');t.value=sc.content;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);toast('Copiado','success')}}
async function dlCur(){const sc=selScr();if(!sc)return;const b=new Blob([sc.content],{type:'text/plain'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=sc.name.replace(/[^a-zA-Z0-9_\-\s]/g,'').replace(/\s+/g,'_')+'.sql';a.click();URL.revokeObjectURL(u);toast('Download iniciado','success')}
async function dupCur(){const sc=selScr();if(!sc)return;const ns=await addScr(sc.content,sc.source);ns.name=uName(sc.name+' (copia)',ns.id);await dbP(ns);await reload();S.selId=ns.id;S.dirty=false;toast('Duplicado','success');render()}
function askDel(){const sc=selScr();if(!sc)return;showCfm('Excluir script','Excluir "'+sc.name+'" do banco local?',async()=>{await rmScr(sc.id);S.dirty=false;toast('Excluido','info');render()})}
async function addNew(){const sc=await addScr('','manual');S.selId=sc.id;S.dirty=false;render();setTimeout(()=>D.EN.focus(),40)}
function askClr(){if(!S.scripts.length){toast('Banco ja esta vazio','warning');return}showCfm('Limpar banco local','Remover TODOS os '+S.scripts.length+' script(s)?',async()=>{await dbC();S.scripts=[];S.ctr=0;S.selId=null;S.dirty=false;await cS('counter',0);toast('Banco limpo','info');render()})}

async function loadEx(){
    const sql=`SELECT id, nome, email, telefone\nFROM clientes\nWHERE ativo = 1\n  AND data_cadastro >= '2024-01-01'\nORDER BY nome ASC;\n\nINSERT INTO produtos (nome, preco, estoque, categoria_id, descricao)\nVALUES ('Notebook Dell Inspiron 15', 3499.99, 25, 3, 'Notebook 8GB RAM 256GB SSD'),\n       ('Mouse Logitech MX Master', 499.90, 150, 5, 'Mouse sem fio ergonomico'),\n       ('Teclado Mecanico Redragon', 289.90, 80, 5, 'Switches Blue RGB');\n\nUPDATE pedidos\nSET status = 'ENVIADO',\n    data_envio = GETDATE(),\n    rastreio = 'BR123456789'\nWHERE id = 1024\n  AND status = 'PROCESSANDO';\n\nDELETE FROM log_acessos\nWHERE data_acesso < DATEADD(DAY, -90, GETDATE())\n  AND nivel = 'INFO';\n\nCREATE TABLE backup_clientes_2024 (\n    id INT PRIMARY KEY IDENTITY(1,1),\n    cliente_id INT NOT NULL,\n    nome VARCHAR(200) NOT NULL,\n    email VARCHAR(150),\n    data_backup DATETIME DEFAULT GETDATE(),\n    CONSTRAINT fk_backup_cliente FOREIGN KEY (cliente_id) REFERENCES clientes(id)\n);\n\nALTER TABLE produtos\nADD COLUMN tags VARCHAR(500) NULL;\n\nDROP TABLE IF EXISTS temp_relatorio_vendas;\n\nGRANT SELECT, INSERT ON produtos TO usuario_relatorio;\n\nDECLARE @total DECIMAL(18,2)\nSELECT @total = SUM(preco * estoque) FROM produtos\nPRINT 'Valor em estoque: ' + CAST(@total AS VARCHAR)`;
    const parts=sql.split(';').map(p=>p.trim()).filter(p=>p.length>0);
    for(const p of parts)await addScr(p,'exemplo');
    toast(parts.length+' exemplos adicionados','success');
    if(!S.selId&&S.scripts.length){S.selId=S.scripts[S.scripts.length-parts.length].id;S.dirty=false}render();
}
function setF(f){S.filter=f;rCh();rLi()}

/* ========== Toast ========== */
function toast(msg,type){
    const c={success:'border-mint/30 bg-mint/10 text-mint-light',warning:'border-amber-500/30 bg-amber-500/10 text-amber-300',error:'border-red-500/30 bg-red-500/10 text-red-300',info:'border-sky-500/30 bg-sky-500/10 text-sky-300'};
    const ic={success:'fa-solid fa-circle-check',warning:'fa-solid fa-triangle-exclamation',error:'fa-solid fa-circle-xmark',info:'fa-solid fa-circle-info'};
    const el=document.createElement('div');
    el.className='pointer-events-auto flex items-center gap-2.5 px-4 py-2.5 rounded-lg border text-sm font-medium anim-ti backdrop-blur-md shadow-xl max-w-sm '+(c[type]||c.info);
    el.innerHTML='<i class="'+(ic[type]||ic.info)+' text-xs shrink-0"></i><span>'+eH(msg)+'</span>';
    D.T.appendChild(el);setTimeout(()=>{el.classList.remove('anim-ti');el.classList.add('anim-too');setTimeout(()=>el.remove(),300)},4000);
}

/* ========== Confirm Modal ========== */

function showCfm(t,m,cb){D.CMt.textContent=t;D.CMm.textContent=m;_cc=cb;D.CM.classList.remove('hidden')}
function hCM(){D.CM.classList.add('hidden');_cc=null}
D.CMy.addEventListener('click',()=>{if(_cc)_cc();hCM()});
D.CM.addEventListener('click',e=>{if(e.target===D.CM)hCM()});

/* ========== Events ========== */
D.SeI.addEventListener('input',e=>{S.search=e.target.value;rLi()});
D.ET.addEventListener('input',()=>{S.dirty=true;uLN();uCI()});
D.EN.addEventListener('input',()=>{S.dirty=true});
D.ET.addEventListener('click',uCI);D.ET.addEventListener('keyup',uCI);
D.ET.addEventListener('scroll',()=>{D.LN.scrollTop=D.ET.scrollTop});
D.ET.addEventListener('keydown',e=>{
    if(e.key==='Tab'){e.preventDefault();const s=e.target.selectionStart,en=e.target.selectionEnd,v=e.target.value;
        if(e.shiftKey){const ls=v.lastIndexOf('\n',s-1)+1;if(v.substring(ls,ls+4)==='    '){e.target.value=v.substring(0,ls)+v.substring(ls+4);e.target.selectionStart=e.target.selectionEnd=Math.max(s-4,ls)}}
        else{e.target.value=v.substring(0,s)+'    '+v.substring(en);e.target.selectionStart=e.target.selectionEnd=s+4}S.dirty=true;uLN()}
    if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveCur()}
    if((e.ctrlKey||e.metaKey)&&e.shiftKey&&e.key==='S'){e.preventDefault();quickSave()}
});
document.addEventListener('keydown',e=>{
    if((e.ctrlKey||e.metaKey)&&e.key==='n'){e.preventDefault();addNew()}
    if(e.key==='Escape'){if(!D.CM.classList.contains('hidden'))hCM();else if(!D.SM.classList.contains('hidden'))D.SM.classList.add('hidden');else if(S.selId&&window.innerWidth<768)desel()}
});
D.IF.addEventListener('change',async e=>{if(e.target.files.length){await impBk(e.target.files[0]);e.target.value=''}});
D.SM.addEventListener('click',e=>{if(e.target===D.SM)D.SM.classList.add('hidden')});

/* ========== Init ========== */
(async()=>{
    try{
        await reload();render();await initFH();
        const url=await cG('syncUrl','');setSS(url?'ok':'o');await autoSync();
        if(!hasFS&&_fn)toast('Seu navegador nao suporta escrita direta em arquivo. O backup sera feito por download.','info');
    }catch(e){console.error('Init:',e);toast('Erro ao iniciar: '+e.message,'error');setSS('o')}
})();
