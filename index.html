    if(sql[i]==='/'&&i+1<len&&sql[i+1]==='*'){var s=i;i+=2;while(i<len-1&&!(sql[i]==='*'&&sql[i+1]==='/'))i++;i+=2;tokens.push({t:'c',x:sql.substring(s,i)});continue}

    if(sql[i]==='"'){var s=i;i++;while(i<len&&sql[i]!=='"')i++;if(i<len)i++;tokens.push({t:'s',x:sql.substring(s,i)});continue}
    if(sql[i]>='0'&&sql[i]<='9'&&(i===0||!/[\w]/.test(sql[i-1]))){var s=i;while(i<len&&((sql[i]>='0'&&sql[i]<='9')||sql[i]==='.'))i++;tokens.push({t:'n',x:sql.substring(s,i)});continue}
    if((sql[i]>='a'&&sql[i]<='z')||(sql[i]>='A'&&sql[i]<='Z')||sql[i]==='_'||sql[i]==='@'){var s=i;while(i<len&&((sql[i]>='a'&&sql[i]<='z')||(sql[i]>='A'&&sql[i]<='Z')||(sql[i]>='0'&&sql[i]<='9')||sql[i]==='_'||sql[i]==='.'))i++;var w=sql.substring(s,i),u=w.toUpperCase();tokens.push({t:KWS.has(u)?'k':FNS.has(u)?'f':'p',x:w});continue}
    tokens.push({t:'p',x:sql[i]});i++
  }
  return tokens;
}
function renderHL(sql){
  var tk=tokenizeSQL(sql),parts=[];
  for(var i=0;i<tk.length;i++){
    var e=tk[i].x.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    if(tk[i].t==='c')parts.push('<span class="sql-cmt">'+e+'</span>');
    else if(tk[i].t==='s')parts.push('<span class="sql-str">'+e+'</span>');
    else if(tk[i].t==='n')parts.push('<span class="sql-num">'+e+'</span>');
    else if(tk[i].t==='k')parts.push('<span class="sql-kw">'+e+'</span>');
    else if(tk[i].t==='f')parts.push('<span class="sql-fn">'+e+'</span>');
    else parts.push(e);
  }
  return parts.join('');
}

function setTheme(th){S.theme=th;document.documentElement.setAttribute('data-theme',th)}
function setLang(l){S.lang=l;document.documentElement.setAttribute('lang',l)}
function toggleTheme(){setTheme(S.theme==='dark'?'light':'dark');S.data.settings.theme=S.theme;save();render()}
function toggleLang(){setLang(S.lang==='pt'?'en':'pt');S.data.settings.language=S.lang;save();render()}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('mobOvl').classList.toggle('active')}

document.addEventListener('keydown',function(e){if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();document.getElementById('searchInput').focus()}if(e.key==='Escape'){closeModal();closeConfirm();hideCtx()}});

async function init(){await load();setTheme(S.theme);setLang(S.lang);render();if(S.data.settings.autoSync&&S.data.settings.remoteUrl)setTimeout(syncRemote,500)}
init();
</script>
</body>
</html>
